services:
  metabase:
    image: metabase/metabase:v0.62.2.12
    hostname: metabase
    volumes:
      - /dev/urandom:/dev/random:ro
    ports:
      - 3000:3000
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabaseappdb
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: mysecretpassword
      MB_DB_HOST: postgres
    networks:
      - metanet1
    healthcheck:
      test: curl --fail -I http://localhost:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
  postgres:
    image: postgres:16
    hostname: postgres
    environment:
      POSTGRES_USER: metabase
      POSTGRES_DB: metabaseappdb
      POSTGRES_PASSWORD: mysecretpassword
    networks:
      - metanet1
  # A separate Postgres used as the target for the metabase_database acceptance
  # tests (a database Metabase connects to, distinct from its own app DB above).
  sample-db:
    image: postgres:16
    hostname: sample-db
    environment:
      POSTGRES_USER: sampleuser
      POSTGRES_DB: sampledb
      POSTGRES_PASSWORD: samplepass
    networks:
      - metanet1
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sampleuser" ]
      interval: 5s
      timeout: 5s
      retries: 5
networks:
  metanet1:
    driver: bridge
